<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register | Dynamic Mastery Assessment</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-page">
  <div class="auth-left">
    <div class="auth-left-content">
      <a href="index.html" class="nav-logo auth-logo">
        <div class="logo-icon"><span class="logo-bolt">⚡</span></div>
        <div class="logo-text">
          <span class="logo-main">DMA</span>
          <span class="logo-sub">Dynamic Mastery</span>
        </div>
      </a>
      <div class="auth-quote">
        <h2>"The secret of getting ahead is getting started."</h2>
        <p>— Mark Twain</p>
      </div>
      <div class="auth-features-mini">
        <div class="afm"><span>✓</span> Adaptive quiz engine</div>
        <div class="afm"><span>✓</span> Topic mastery tracking</div>
        <div class="afm"><span>✓</span> 500+ UTME/SSCE questions</div>
        <div class="afm"><span>✓</span> Instant explanations</div>
      </div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Create Account</h1>
        <p>Start your free adaptive practice journey</p>
      </div>
      <!-- BACKEND NOTE: Form action and method to be set by backend team. POST to /api/register -->
      <form class="auth-form" id="registerForm" action="#" method="POST" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="first_name" placeholder="e.g. David" required/>
            <span class="field-error" id="err-firstName"></span>
          </div>
          <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="last_name" placeholder="e.g. Anjorin" required/>
            <span class="field-error" id="err-lastName"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="yourname@email.com" required/>
          <span class="field-error" id="err-email"></span>
        </div>
        <div class="form-group">
          <label for="phone">Phone Number <span class="optional">(optional)</span></label>
          <input type="tel" id="phone" name="phone" placeholder="+234 800 000 0000"/>
        </div>
        <div class="form-group">
          <label>Exam Type</label>
          <div class="radio-group">
            <label class="radio-option">
              <input type="radio" name="exam_type" value="UTME" checked/>
              <span class="radio-custom"></span>
              UTME (University)
            </label>
            <label class="radio-option">
              <input type="radio" name="exam_type" value="SSCE"/>
              <span class="radio-custom"></span>
              SSCE (Secondary)
            </label>
            <label class="radio-option">
              <input type="radio" name="exam_type" value="BOTH"/>
              <span class="radio-custom"></span>
              Both
            </label>
          </div>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <input type="password" id="password" name="password" placeholder="Min. 8 characters" required/>
            <button type="button" class="toggle-password" onclick="togglePwd('password', this)">👁</button>
          </div>
          <div class="password-strength" id="pwStrength">
            <div class="ps-bar"><div class="ps-fill" id="psFill"></div></div>
            <span id="psLabel"></span>
          </div>
          <span class="field-error" id="err-password"></span>
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-icon-wrap">
            <input type="password" id="confirmPassword" name="confirm_password" placeholder="Re-enter password" required/>
            <button type="button" class="toggle-password" onclick="togglePwd('confirmPassword', this)">👁</button>
          </div>
          <span class="field-error" id="err-confirm"></span>
        </div>
        <div class="form-check">
          <label class="checkbox-option">
            <input type="checkbox" name="agree_terms" id="agreeTerms" required/>
            <span class="checkbox-custom"></span>
            I agree to the <a href="#">Terms of Use</a> and <a href="#">Privacy Policy</a>
          </label>
          <span class="field-error" id="err-terms"></span>
        </div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="registerBtn">
          <span class="btn-text">Create My Account</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
      </form>
      <p class="auth-switch">Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
