<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — RBAPS</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <link rel="stylesheet" href="../css/nav.css"/>
  <style>
    .profile-layout { display: grid; grid-template-columns: 300px 1fr; gap: 24px; align-items: start; }
    .profile-avatar-card { text-align: center; }
    .profile-avatar-wrap { width: 88px; height: 88px; border-radius: 50%; background: var(--accent-lt); display: flex; align-items: center; justify-content: center; margin: 0 auto 14px; font-family: var(--font-display); font-size: 2.2rem; color: var(--accent); border: 3px solid var(--border); }
    .profile-name { font-family: var(--font-display); font-size: 1.3rem; }
    .profile-email { font-size: .83rem; color: var(--ink-3); margin-top: 2px; }
    .profile-stats { display: flex; justify-content: center; gap: 24px; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .p-stat { text-align: center; }
    .p-stat .pv { font-family: var(--font-display); font-size: 1.4rem; color: var(--ink); }
    .p-stat .pl { font-size: .72rem; color: var(--ink-3); }
    @media(max-width: 800px){ .profile-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="#fff" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="logo-text">RBA<span>PS</span></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Main</div>
      <div class="nav-item" data-page="dashboard.html">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </div>
      <div class="nav-item" data-page="practice.html"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><polygon points="5 3 19 12 5 21 5 3"/></svg>Practice</div>
      <div class="nav-item" data-page="analytics.html"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>Analytics</div>
      <div class="nav-section-label" style="margin-top:8px">Account</div>
      <div class="nav-item active" data-page="profile.html"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Profile</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-pill">
        <div class="user-avatar">D</div>
        <div class="user-info"><div class="user-name">David Anjorin</div><div class="user-role">UTME &amp; SSCE</div></div>
      </div>
    </div>
  </aside>
  <div class="sidebar-overlay" id="sidebar-overlay"></div>

  <main class="main-content">
    <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:50;">
      <button class="hamburger" id="hamburger-btn"><svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      <span style="font-family:var(--font-display);font-size:1rem;">Profile</span>
    </div>

    <div class="page-header">
      <div class="page-title-wrap">
        <h1 class="page-title fade-up">My Profile</h1>
        <p class="page-subtitle fade-up fade-up-d1">Manage your account and preferences</p>
      </div>
    </div>

    <div class="page-body">
      <div class="profile-layout">
        <!-- Left -->
        <div class="card profile-avatar-card fade-up">
          <div class="card-body">
            <div class="profile-avatar-wrap">D</div>
            <div class="profile-name">David Anjorin</div>
            <div class="profile-email">david@example.com</div>
            <span class="badge badge-accent" style="margin-top:10px;display:inline-flex;">UTME &amp; SSCE</span>
            <div class="profile-stats">
              <div class="p-stat"><div class="pv">24</div><div class="pl">Sessions</div></div>
              <div class="p-stat"><div class="pv">63%</div><div class="pl">Avg Mastery</div></div>
              <div class="p-stat"><div class="pv">3</div><div class="pl">Mastered</div></div>
            </div>
          </div>
          <div class="card-footer">
            <a href="login.html" class="btn btn-danger btn-block btn-sm">Sign Out</a>
          </div>
        </div>

        <!-- Right -->
        <div style="display:flex;flex-direction:column;gap:20px;">
          <div class="card fade-up fade-up-d1">
            <div class="card-header"><h3 style="font-size:1rem;">Personal Information</h3></div>
            <div class="card-body">
              <form style="display:flex;flex-direction:column;gap:16px;" onsubmit="saveProfile(event)">
                <div class="grid grid-2" style="gap:14px">
                  <div class="form-group"><label class="form-label">First Name</label><input class="form-control" type="text" value="David"/></div>
                  <div class="form-group"><label class="form-label">Last Name</label><input class="form-control" type="text" value="Anjorin"/></div>
                </div>
                <div class="form-group"><label class="form-label">Email</label><input class="form-control" type="email" value="david@example.com"/></div>
                <div class="form-group">
                  <label class="form-label">Exam Target</label>
                  <select class="form-control">
                    <option value="both" selected>Both UTME &amp; SSCE</option>
                    <option value="utme">UTME only</option>
                    <option value="ssce">SSCE only</option>
                  </select>
                </div>
                <button type="submit" class="btn btn-primary" style="align-self:flex-start;">Save Changes</button>
              </form>
            </div>
          </div>

          <div class="card fade-up fade-up-d2">
            <div class="card-header"><h3 style="font-size:1rem;">Change Password</h3></div>
            <div class="card-body">
              <form style="display:flex;flex-direction:column;gap:14px;" onsubmit="changePassword(event)">
                <div class="form-group"><label class="form-label">Current Password</label><input class="form-control" type="password" placeholder="Enter current password"/></div>
                <div class="form-group"><label class="form-label">New Password</label><input class="form-control" type="password" placeholder="Enter new password"/></div>
                <div class="form-group"><label class="form-label">Confirm New Password</label><input class="form-control" type="password" placeholder="Repeat new password"/></div>
                <button type="submit" class="btn btn-outline" style="align-self:flex-start;">Update Password</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="toast-container"></div>
<script src="../js/main.js"></script>
<script>
function saveProfile(e) { e.preventDefault(); showToast('Profile updated successfully', 'success'); }
function changePassword(e) { e.preventDefault(); showToast('Password changed successfully', 'success'); }
document.getElementById('hamburger-btn')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('sidebar-overlay').classList.add('open');
});
document.getElementById('sidebar-overlay')?.addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
});
</script>
</body>
</html>
