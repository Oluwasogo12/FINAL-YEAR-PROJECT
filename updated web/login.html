<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | Dynamic Mastery Assessment</title>
  <link rel="stylesheet" href="style.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
<div class="auth-page auth-page-login">
  <div class="auth-left">
    <div class="auth-left-content">
      <a href="index.html" class="nav-logo auth-logo">
        <div class="logo-icon"><span class="logo-bolt">⚡</span></div>
        <div class="logo-text">
          <span class="logo-main">DMA</span>
          <span class="logo-sub">Dynamic Mastery</span>
        </div>
      </a>
      <div class="auth-quote">
        <h2>"Education is the most powerful weapon you can use to change the world."</h2>
        <p>— Nelson Mandela</p>
      </div>
      <div class="auth-features-mini">
        <div class="afm"><span>✓</span> Pick up where you left off</div>
        <div class="afm"><span>✓</span> View your mastery progress</div>
        <div class="afm"><span>✓</span> Continue your study streak</div>
      </div>
    </div>
  </div>
  <div class="auth-right">
    <div class="auth-card">
      <div class="auth-card-header">
        <h1>Welcome Back!</h1>
        <p>Login to continue your practice</p>
      </div>
      <!-- BACKEND NOTE: Form action and method to be set by backend team. POST to /api/login -->
      <form class="auth-form" id="loginForm" action="#" method="POST" novalidate>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="yourname@email.com" required/>
          <span class="field-error" id="err-email"></span>
        </div>
        <div class="form-group">
          <label for="password">Password <a href="forgot-password.html" class="forgot-link">Forgot Password?</a></label>
          <div class="input-icon-wrap">
            <input type="password" id="password" name="password" placeholder="Your password" required/>
            <button type="button" class="toggle-password" onclick="togglePwd('password', this)">👁</button>
          </div>
          <span class="field-error" id="err-password"></span>
        </div>
        <div class="form-check">
          <label class="checkbox-option">
            <input type="checkbox" name="remember_me" id="rememberMe"/>
            <span class="checkbox-custom"></span>
            Remember me on this device
          </label>
        </div>
        <!-- BACKEND NOTE: Display server-side errors inside .server-error div -->
        <div class="server-error hidden" id="serverError"></div>
        <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
          <span class="btn-text">Login</span>
          <span class="btn-spinner hidden">⏳</span>
        </button>
      </form>
      <p class="auth-switch">Don't have an account? <a href="register.html">Sign up free</a></p>
    </div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
